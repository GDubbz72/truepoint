<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Truepoint People Solutions — Practical HR. Confident leadership. Real results.</title>
<link rel="stylesheet" href="assets/colors_and_type.css">
<link rel="stylesheet" href="styles.css">
<link rel="icon" type="image/svg+xml" href="assets/logo-mnemonic-jade.svg">
</head>
<body data-theme="jade">
  <div id="root" data-screen-label="Truepoint · Landing"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js"></script>

  <script type="text/babel" src="src/Nav.jsx"></script>
  <script type="text/babel" src="src/Hero.jsx"></script>
  <script type="text/babel" src="src/Services.jsx"></script>
  <script type="text/babel" src="src/WhyHowWho.jsx"></script>
  <script type="text/babel" src="src/TestimonialFAQ.jsx"></script>
  <script type="text/babel" src="src/ContactFooter.jsx"></script>
  <script type="text/babel" src="src/DiscoveryCallModal.jsx"></script>
  <script type="text/babel" src="src/TweaksPanel.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    function App() {
      const [tweaks, setTweaks] = useState(window.LANDING_DEFAULTS);
      const [tweaksVisible, setTweaksVisible] = useState(false);
      const [modalOpen, setModalOpen] = useState(false);

      // Edit-mode protocol
      useEffect(() => {
        const onMsg = (e) => {
          const t = e.data && e.data.type;
          if (t === '__activate_edit_mode') setTweaksVisible(true);
          if (t === '__deactivate_edit_mode') setTweaksVisible(false);
        };
        window.addEventListener('message', onMsg);
        window.parent.postMessage({ type: '__edit_mode_available' }, '*');
        return () => window.removeEventListener('message', onMsg);
      }, []);

      // Apply theme
      useEffect(() => {
        document.body.setAttribute('data-theme', tweaks.theme);
      }, [tweaks.theme]);

      // Scroll-in reveals
      useEffect(() => {
        const els = document.querySelectorAll('.tp-reveal');
        const io = new IntersectionObserver((entries) => {
          entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('is-in'); io.unobserve(e.target); } });
        }, { threshold: 0.12, rootMargin: '0px 0px -60px 0px' });
        els.forEach(el => io.observe(el));
        return () => io.disconnect();
      }, [tweaks.sectionOrder]);

      const open = () => setModalOpen(true);

      // Section blocks
      const Promise_ = <PromiseSection key="promise" />;
      const Services_ = <Services key="services" />;
      const Why_ = <WhyTruepoint key="why" />;
      const Who_ = <WhoWeServe key="who" />;
      const How_ = <HowWeWork key="how" />;

      let middle;
      if (tweaks.sectionOrder === 'credibility') {
        middle = [Why_, Services_, How_, Who_];
      } else if (tweaks.sectionOrder === 'process') {
        middle = [How_, Services_, Why_, Who_];
      } else {
        middle = [Promise_, Services_, Why_, Who_, How_];
      }

      return (
        <>
          <Nav onOpenCall={open} />
          <Hero
            ctaText={tweaks.primaryCta}
            tagline={tweaks.tagline}
            darkHero={tweaks.darkHero}
            onOpenCall={open}
          />
          {middle}
          <TestimonialPlaceholder />
          <FAQ />
          <FinalCTA ctaText={tweaks.primaryCta} onOpenCall={open} />
          <ContactForm onOpenCall={open} />
          <Footer />
          <DiscoveryCallModal open={modalOpen} onClose={() => setModalOpen(false)} />
          <TweaksPanel state={tweaks} setState={setTweaks} visible={tweaksVisible} />
        </>
      );
    }

    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
